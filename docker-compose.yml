# Full stack for local/demo use: database + API + client.
# Bring everything up with a single command:
#
#   docker compose up --build
#
# Then open http://localhost:5173

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maja
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d maja']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./apps/api
    environment:
      NODE_ENV: local
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/maja
      CORS: http://localhost:5173
      JWT_SECRET: secret
      JWT_EXPIRES_IN: 604800
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./apps/client
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  pgdata:
